<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASMINE ONE | Lebanese Restaurant & Coffee</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            text-align: center;
            background: #ffffff;
            color: #000000;
            scroll-behavior: smooth;
        }
        
        nav {
            background: #000000;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-size: 0.9em;
        }
        nav a:hover { color: #888888; }

        header {
            position: relative;
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('23.jpeg') no-repeat center center;
            background-size: cover;
            color: #ffffff;
            text-align: center;
        }

        header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: 0;
        }

        header h1, header p {
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-size: 5em;
            letter-spacing: 12px;
            font-weight: 400;
            margin: 0;
            text-shadow: 
                0 0 10px rgba(0,0,0,0.8),
                0 5px 30px rgba(0,0,0,1);
        }

        header p {
            margin-top: 20px;
            font-size: 1em;
            letter-spacing: 4px;
            color: #f1f1f1;
            text-shadow: 0 3px 15px rgba(0,0,0,0.9);
        }

        section {
            padding: 4rem 1rem;
            max-width: 1200px;
            margin: auto;
        }

        .grey-bg {
            background: #f4f4f4;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
        }

        .menu-header {
            cursor: pointer;
            display: inline-block;
            transition: 0.3s;
        }
        .menu-header:hover h2 { color: #888; }

        .menu-content {
            display: none;
            margin-top: 3rem;
            padding-bottom: 2rem;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .menu-grid img {
            width: 100%;
            max-width: 600px;
            border: 1px solid #000000;
            display: block;
        }

        /* Social buttons using Inline SVG */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #000;
            transition: 0.3s;
            text-decoration: none;
        }
        
        /* SVG Icon styling */
        .social-links svg {
            width: 30px;
            height: 30px;
            fill: #ffffff; /* Sets icon color to white */
        }

        .social-links a:hover.instagram { 
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); 
        }
        
        .social-links a:hover.tiktok {
            background: #000;
            box-shadow: 2px 2px 0px #ff0050, -2px -2px 0px #00f2ea;
        }

        .map-container {
            margin-top: 40px;
            border: 1px solid #000000;
        }
        
        h2 {
            font-size: 2.2em;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #000000;
            margin: 0;
        }
        
        footer {
            background: #000000;
            color: #ffffff;
            padding: 3rem;
            font-size: 0.8em;
            letter-spacing: 2px;
        }

        @media(max-width: 768px) {
            header h1 { font-size: 3em; letter-spacing: 8px; }
            .menu-grid img { max-width: 90%; }
        }
    </style>
</head>

<body>

</section>

<script>
function toggleMenu(id) {
    var menu = document.getElementById(id);
    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}
</script>
